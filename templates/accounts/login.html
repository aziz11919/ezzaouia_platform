<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — EZZAOUIA</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a1628;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #111f35;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      color: #4da6ff;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .logo p {
      color: #6b8db5;
      font-size: 12px;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      color: #8aa8cc;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      background: #0d1b2e;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      color: #e0ecff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4da6ff; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #1a6bb5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #2280d4; }
    .error {
      background: #2d1515;
      border: 1px solid #5c2020;
      color: #ff8080;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      color: #3d5a7a;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>EZZAOUIA</h1>
      <p>MARETAP — Plateforme de production</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="error">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Identifiant</label>
        <input type="text" name="username" autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Se connecter</button>
    </form>

    <div class="footer">MARETAP © 2026 — Accès réservé au personnel autorisé</div>
  </div>
</body>
</html>
