{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapport PDF - EZZAOUIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080C10;
      --panel: #111820;
      --panel-2: #151F2A;
      --text: #E9EEF6;
      --muted: #8EA0B8;
      --border: rgba(255,255,255,0.08);
      --accent: #C0392B;
      --accent-hover: #D04B3D;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 0%, #102031 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      padding: 24px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .brand img {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      background: #fff;
      padding: 4px;
    }
    .brand-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }
    .brand-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    select {
      width: 100%;
      background: #0D141C;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    select:focus { border-color: var(--accent); }
    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      min-width: 240px;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="{% static 'img/logomaretap.png' %}" alt="MARETAP">
      <div>
        <div class="brand-title">Rapport PDF Mensuel</div>
        <div class="brand-sub">Champ EZZAOUIA - CPF Zarzis</div>
      </div>
    </div>

    <form method="get">
      <input type="hidden" name="download" value="1">
      <div class="form-row">
        <div>
          <label for="month">Mois</label>
          <select id="month" name="month">
            {% for num, label in months %}
              <option value="{{ num }}" {% if selected_month == num %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="year">Annee</label>
          <select id="year" name="year">
            {% for y in years %}
              <option value="{{ y }}" {% if selected_year == y %}selected{% endif %}>{{ y }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary">Generer le rapport PDF</button>
        <a href="{% url 'dashboard:home' %}" class="btn btn-ghost">Retour dashboard</a>
      </div>
    </form>
  </div>
</body>
</html>
