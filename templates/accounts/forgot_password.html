{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('ezzaouia-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZZAOUIA — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:#C0392B;
      --dark:#050D18; --dark2:#0A1628; --dark3:#0F1F38; --dark4:#162847;
      --border:rgba(201,168,76,0.12); --border-soft:rgba(255,255,255,0.06);
      --text:#E8EEF8; --text-muted:#6B85A8; --text-dim:#3D5272;
      --gold:#C9A84C; --green:#4DAA7A;
    }
    [data-theme="light"] {
      --dark:#F0F4FA; --dark2:#FFFFFF; --dark3:#E8EEF8; --dark4:#DDE5F0;
      --text:#1A2540; --text-muted:#4A6080; --text-dim:#8090A8;
      --border:rgba(201,168,76,0.2); --border-soft:rgba(0,0,0,0.08);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{width:100%;max-width:440px;background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:40px;position:relative;overflow:hidden;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
    .logo-wrap{text-align:center;margin-bottom:28px;}
    .logo-wrap img{width:48px;height:48px;border-radius:8px;background:#fff;padding:2px;}
    .card-title{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:var(--text);text-align:center;margin-bottom:6px;}
    .card-sub{font-size:13px;color:var(--text-muted);text-align:center;line-height:1.6;margin-bottom:28px;}
    .form-group{margin-bottom:20px;}
    .form-label{display:block;font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
    .form-input{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:6px;padding:12px 16px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:all 0.2s;}
    .form-input:focus{border-color:var(--gold);background:var(--dark4);box-shadow:0 0 0 3px rgba(201,168,76,0.08);}
    .btn-submit{width:100%;background:var(--red);color:#fff;border:none;border-radius:6px;padding:14px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:4px;}
    .btn-submit:hover{background:#A93226;box-shadow:0 4px 14px rgba(192,57,43,0.3);}
    .success-box{background:rgba(77,170,122,0.1);border:1px solid rgba(77,170,122,0.3);border-radius:6px;padding:14px 16px;margin-bottom:20px;display:flex;gap:10px;align-items:flex-start;}
    .success-box svg{flex-shrink:0;color:#4DAA7A;}
    .success-box p{font-size:13px;color:#6BC99A;line-height:1.5;}
    .back-link{display:block;text-align:center;margin-top:18px;font-size:13px;color:var(--text-dim);text-decoration:none;transition:color 0.15s;}
    .back-link:hover{color:var(--red);}
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="{% static 'img/logomaretap.png' %}" alt="MARETAP">
  </div>

  <div class="card-title">Forgot your password?</div>
  <div class="card-sub">Enter your MARETAP email address and we will send you a reset link.</div>

  {% if success %}
  <div class="success-box">
    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <p>{{ success }}</p>
  </div>
  {% else %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input class="form-input" type="email" id="email" name="email" placeholder="yourname@maretap.tn" autocomplete="email" autofocus required>
    </div>
    <button type="submit" class="btn-submit">Send Reset Link</button>
  </form>
  {% endif %}

  <a href="{% url 'accounts:login' %}" class="back-link">← Back to Login</a>
</div>
<script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
