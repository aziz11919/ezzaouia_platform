{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('ezzaouia-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Report - EZZAOUIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080C10;
      --panel: #111820;
      --panel-2: #151F2A;
      --text: #E9EEF6;
      --muted: #8EA0B8;
      --border: rgba(255,255,255,0.08);
      --accent: #C0392B;
      --accent-hover: #D04B3D;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 0%, #102031 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      padding: 24px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .brand img {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      background: #fff;
      padding: 4px;
    }
    .brand-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }
    .brand-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    select {
      width: 100%;
      background: #0D141C;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    select:focus { border-color: var(--accent); }
    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      min-width: 240px;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--accent);
    }
    .theme-toggle {
      margin-left: auto;
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .theme-toggle:hover {
      color: var(--text);
      border-color: var(--accent);
    }
    html[data-theme="light"] {
      --bg: #F0F4F8;
      --panel: #FFFFFF;
      --panel-2: #F4F7FC;
      --text: #1A2332;
      --muted: #66758D;
      --border: rgba(0,0,0,0.08);
      --accent: #B53A2E;
      --accent-hover: #C24A3B;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="{% static 'img/logomaretap.png' %}" alt="MARETAP">
      <div>
        <div class="brand-title">Monthly PDF Report</div>
        <div class="brand-sub">EZZAOUIA Field - CPF Zarzis</div>
      </div>
      <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" title="Switch to light mode">
        <svg class="icon-sun" width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg class="icon-moon" width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:none">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
    </div>

    <form method="get">
      <input type="hidden" name="download" value="1">
      <div class="form-row">
        <div>
          <label for="month">Month</label>
          <select id="month" name="month">
            {% for num, label in months %}
              <option value="{{ num }}" {% if selected_month == num %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="year">Year</label>
          <select id="year" name="year">
            {% for y in years %}
              <option value="{{ y }}" {% if selected_year == y %}selected{% endif %}>{{ y }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary">Generate PDF report</button>
        <a href="{% url 'dashboard:home' %}" class="btn btn-ghost">Back to dashboard</a>
      </div>
    </form>
  </div>
  <script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
